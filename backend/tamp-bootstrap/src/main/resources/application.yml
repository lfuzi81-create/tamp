# ============================================================
# TAMP (TAMP) 主配置文件
# ============================================================

server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: tamp

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  # ----- 数据源配置 -----
  datasource:
    url: jdbc:mysql://localhost:3306/tamp?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  # ----- JPA 配置 -----
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  # ----- Redis 配置 -----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 3000ms

  # ----- Jackson 配置 -----
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # ----- 文件上传配置 -----
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# ============================================================
# 应用自定义配置
# ============================================================
tamp:
  share:
    domain: https://www.zgsmam.com
    path: /s

  # JWT 配置
  jwt:
    secret: ${JWT_SECRET:Tamp2024SecretKeyForJwtTokenGenerationAndValidationMustBeAtLeast256BitsLong}
    expiration: 86400000        # Token 有效期：24小时（毫秒）
    refresh-expiration: 604800000  # Refresh Token 有效期：7天
    header: Authorization
    prefix: "Bearer "

  # 短信验证码配置
  sms:
    code-expiration: 300         # 验证码有效期：5分钟（秒）
    send-interval: 60            # 发送间隔：60秒
    # 开发环境万能验证码：配置后，登录/找回密码时输入该验证码即可直接通过，无需真实短信。
    # 生产环境务必留空（或删除此项）以禁用！
    dev-bypass-code: "000000"

  # 文件存储路径
  file:
    upload-path: ${FILE_UPLOAD_PATH:/tmp/tamp-uploads}
    access-path: /uploads
    max-size: 5MB

# 日志级别
logging:
  level:
    root: INFO
    com.tamp: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
